services:

  # Main logic; writes to DB
  processor:
    env_file:
      - .env
    build:
      context: ./processor
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python main.py

  # Connects SQLite to frontend
  api:
    build: ./api
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/aura.db
    expose:
      - "8000"

  # Streamlit Dashboard; reads from DB
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data
    ports:
      - "8501:8501"
    environment:
      - DB_PATH=/app/data/aura.db
    depends_on:
      - processor

  # SvelteKit frontend
  frontend:
    build:
      context: ./aura-frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - PORT=3000
      - ORIGIN=http://localhost
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Nginx; reverse proxy
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_started

